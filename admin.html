<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>链接管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:40px 20px}
.container{max-width:700px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:32px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#666;font-size:14px;margin-bottom:24px}
label{display:block;font-size:14px;font-weight:500;margin-bottom:6px;color:#333}
input{width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;outline:none;transition:border .2s;margin-bottom:16px;box-sizing:border-box}
input:focus{border-color:#4facfe}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;cursor:pointer;color:#fff;font-weight:500}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#4facfe,#00f2fe)}
#status{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
#status.show{display:block}
#status.info{background:#e6f7ff;border:1px solid #91d5ff;color:#1890ff}
#status.ok{background:#f6ffed;border:1px solid #b7eb8f;color:#52c41a}
#status.err{background:#fff2f0;border:1px solid #ffccc7;color:#ff4d4f}
#linkBox{display:none;margin-top:20px;padding:20px;background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px}
#linkBox .u{font-size:18px;color:#4facfe;word-break:break-all;padding:12px;background:#fff;border-radius:6px;border:1px solid #e8e8e8;cursor:pointer;font-family:monospace;text-align:center;font-weight:500;margin-top:8px}
.hint{font-size:12px;color:#999;margin-top:8px;text-align:center}
.back-link{display:inline-block;margin-top:16px;color:#4facfe;text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>链接管理</h1>
<p class="desc">每次生成新链接，旧链接自动作废</p>
<label>Token</label>
<input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
<p class="hint" style="text-align:left;margin-top:-12px;margin-bottom:16px">只需输入一次，浏览器会记住</p>
<button class="btn btn-primary" id="genBtn">生成新链接</button>
<div id="status"></div>
<div id="linkBox">
<div style="font-size:13px;color:#666">新链接已生成（旧链接已作废）</div>
<div class="u" id="linkUrl" onclick="copy(this)"></div>
<div class="hint">点击链接复制 &middot; 1-2分钟后生效</div>
</div>
</div>
<a class="back-link" href="index.html">返回跳转页</a>
</div>

<script>
var REPO = 'waqerqwrqwr/jump-link';
var BRANCH = 'master';
var TARGET = 'https://iosge.top/a/br/cde41b970e6604d9';
var BASE = 'https://waqerqwrqwr.github.io/jump-link';

// 子页面模板 - 用 meta refresh 跳转，不用 script 标签
var REDIRECT_PAGE = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=' + TARGET + '"><title>跳转中</title><style>body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:#1a1a2e;color:#fff;font-family:sans-serif}h1{font-weight:400;font-size:20px;opacity:.6}</style></head><body><h1>正在跳转...</h1></body></html>';

var EXPIRE_PAGE = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>链接已过期</title><style>body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:#1a1a2e;color:#fff;font-family:sans-serif;text-align:center;padding:20px}h1{font-size:24px;opacity:.6;font-weight:400}p{color:rgba(255,255,255,.3);font-size:14px}</style></head><body><div><h1>此链接已过期</h1><p>请向发布者索取最新链接</p></div></body></html>';

var savedToken = localStorage.getItem('gh_token');
if (savedToken) document.getElementById('token').value = savedToken;

document.getElementById('genBtn').onclick = generate;

function rnd() {
  var c = 'abcdefghijklmnopqrstuvwxyz0123456789';
  var r = '';
  for (var i = 0; i < 8; i++) r += c[Math.floor(Math.random() * c.length)];
  return r;
}

function hd(t) {
  return { 'Authorization': 'token ' + t, 'Accept': 'application/vnd.github.v3+json' };
}

function st(m, t) {
  var e = document.getElementById('status');
  e.textContent = m;
  e.className = 'show ' + t;
}

async function generate() {
  var token = document.getElementById('token').value.trim();
  if (!token) { st('请输入 Token', 'err'); return; }
  localStorage.setItem('gh_token', token);

  var id = rnd();
  var url = BASE + '/links/' + id + '/';
  var hh = hd(token);

  st('正在处理...', 'info');
  document.getElementById('genBtn').disabled = true;

  try {
    // 1. 读取旧链接
    var r1 = await fetch('https://api.github.com/repos/' + REPO + '/contents/links', { headers: hh });
    var items = [];
    if (r1.ok) {
      var list = await r1.json();
      if (Array.isArray(list)) items = list.filter(function(x) { return x.type === 'dir'; });
    }

    // 2. 逐个覆盖为过期页面
    for (var i = 0; i < items.length; i++) {
      st('作废旧链接 ' + items[i].name + ' (' + (i+1) + '/' + items.length + ')', 'info');
      var r2 = await fetch('https://api.github.com/repos/' + REPO + '/contents/links/' + items[i].name + '/index.html', { headers: hh });
      if (!r2.ok) continue;
      var d2 = await r2.json();
      var eb64 = btoa(unescape(encodeURIComponent(EXPIRE_PAGE)));
      await fetch('https://api.github.com/repos/' + REPO + '/contents/links/' + items[i].name + '/index.html', {
        method: 'PUT',
        headers: Object.assign({}, hh, { 'Content-Type': 'application/json' }),
        body: JSON.stringify({ message: 'expire ' + items[i].name, content: eb64, sha: d2.sha, branch: BRANCH })
      });
    }

    // 3. 创建新链接
    st('正在创建新链接...', 'info');
    var nb64 = btoa(unescape(encodeURIComponent(REDIRECT_PAGE)));
    await fetch('https://api.github.com/repos/' + REPO + '/contents/links/' + id + '/index.html', {
      method: 'PUT',
      headers: Object.assign({}, hh, { 'Content-Type': 'application/json' }),
      body: JSON.stringify({ message: 'new ' + id, content: nb64, branch: BRANCH })
    });

    // 4. 完成
    st('', '');
    document.getElementById('linkBox').style.display = 'block';
    document.getElementById('linkUrl').textContent = url;
    document.getElementById('genBtn').textContent = '再生成一个（已作废 ' + items.length + ' 个旧链接）';

  } catch(e) {
    st('错误: ' + e.message, 'err');
  }
  document.getElementById('genBtn').disabled = false;
}

function copy(el) {
  var u = el.textContent;
  navigator.clipboard.writeText(u).then(function() {
    el.style.background = '#e6f7ff';
    setTimeout(function() { el.style.background = '#fff'; }, 1000);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = u; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  });
}
</script>
</body>
</html>
